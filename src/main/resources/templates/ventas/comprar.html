<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>Confirmar Compra</title>
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <header>
            <h1>Confirmar Compra</h1>
        </header>

        <section>

            <h2 th:text="${producto.descripcion}"></h2>

            <img th:src="${producto.imagen}" width="200">

            <p>
                Precio: ₡ <span th:text="${producto.precio}"></span>
            </p>

            <!-- FORMULARIO DE COMPRA -->

            <form th:action="@{/ventas/confirmar}" method="post">

                <input type="hidden" 
                       name="idProducto" 
                       th:value="${producto.idProducto}">

                <label>Cantidad</label>
                <input type="number" 
                       name="cantidad"
                       value="1" 
                       min="1">

                <br><br>

                <button class="btn-login">
                    Confirmar Compra
                </button>

            </form>

            <!-- MENSAJE DE COMPRA -->

            <div th:if="${mensaje}" class="mensaje-compra">

                <h2 th:text="${mensaje}"></h2>

                <br>

                <a th:href="@{/producto/listado}" class="btn-login">
                    Volver al menú
                </a>

            </div>

        </section>

    </body>

</html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>Cafetería - Inicio de Sesión</title>
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body class="login-body">

        <html xmlns="http://www.w3.org/1999/xhtml"
              xmlns:th="http://www.thymeleaf.org"
              xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

            <head>
                <title>Cafetería - Inicio de Sesión</title>
                <link rel="stylesheet" th:href="@{/css/estilos.css}">
            </head>

            <body class="login-body">

                <div class="login-container">

                    ```
                    <!-- PANEL IZQUIERDO -->
                    <div class="login-left">

                        <h1 class="titulo">Tienda web<br>Cafetería</h1>

                        <h2>Bienvenido de nuevo</h2>

                        <p class="descripcion">
                            Gestiona tus ventas, inventario y equipo
                            en un solo lugar.
                        </p>

                    </div>


                    <!-- PANEL DERECHO -->
                    <div class="login-right">

                        <div class="login-card">

                            <h1 class="titulo">INICIO DE SESION</h1>
                            <h3>Ingresa tus creddenciales para acceder</h3>

                            <form th:action="@{/login}" method="post">

                                <div class="campo">
                                    <label>Usuario</label>
                                    <input type="text"
                                           name="username"
                                           placeholder="Ingrese su usuario"
                                           required>
                                </div>

                                <div class="campo">
                                    <label>Contraseña</label>
                                    <input type="password"
                                           name="password"
                                           placeholder="Ingrese su contraseña"
                                           required>
                                </div>

                                <button type="submit" class="btn-login">
                                    Ingresar
                                </button>

                            </form>

                            <p class="info">Sistema de Cafetería</p>

                        </div>

                    </div>
                    ```

                </div>

            </body>
        </html>


    </body>
</html>
